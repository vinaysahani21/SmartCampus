<div class="login-wrapper">
  <a routerLink="/" class="back-link">
    <span class="arrow">←</span> Back to Home
  </a>

  <div class="login-card">
    <div class="brand-logo">Smart<span>Campus</span></div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to manage your institution</p>

    <div class="error-alert" *ngIf="errorMessage">
      <span class="icon">⚠️</span> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="input-group">
        <label>Username</label>
        <input 
          type="text" 
          name="username" 
          [(ngModel)]="loginData.username" 
          placeholder="e.g. admin" 
          required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="loginData.password" 
          placeholder="••••••••" 
          required>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

<button type="submit" class="login-btn" [disabled]="isLoading">
    <span *ngIf="!isLoading">Sign In</span>
    
    <span *ngIf="isLoading" class="loader-content">
      <span class="spinner"></span> Verifying...
    </span>
  </button>    </form>
  </div>
</div>
